<!doctype html>
<html lang="sv">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://kit.fontawesome.com/b5d5f68d91.js" crossorigin="anonymous"></script>
  <title>dt208g-laboration1</title>
</head>

<body>
  <div class="container">
    <header>
      <h1>Högskolekurser</h1>
    </header>
    <main>
      <div id="courses">
        <h2>Mina kurser</h2>
        <div id="my-courses">
          <table id="table-courses">
            <thead>
              <tr>
                <th id="courseCode">Kurskod</th>
                <th id="courseName">Kursnamn</th>
                <th id="courseProg">Progression</th>
                <th id="courseSyll">Länk</th>
              </tr>
            </thead>
            <tbody id="table-data">

            </tbody>
          </table>
        </div>
        <button id="button-add">Lägg till kurs</button>
        <div id="error">
          <ul id="error-list"></ul>
        </div>
        <div id="form-course">
          <form id="add-course">
            <label for="code">Kurskod:</label><br>
            <input type="text" id="code">
            <br>
            <label for="name">Kursnamn:</label><br>
            <input type="text" id="name">
            <br>
            <label for="progression">Progression:</label><br>
            <input type="text" id="prog">
            <br>
            <label for="syllabus">URL:</label><br>
            <input type="text" id="syllabus">
            <br>
            <button type="submit">Spara kurs</button>
          </form>
        </div>
      </div>
    </main>
    <footer>Skapad av Hanna Lindkvist, 2026</footer>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
